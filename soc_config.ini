; SOC Level 2 Advanced Dashboard Configuration

[splunk]
enabled = true
host = your-splunk-server.com
port = 8088
token = your-splunk-hec-token
index = security
sourcetype = soc_advanced
ssl_verify = false

[alerts]
enabled = true
email_enabled = false
slack_enabled = false
slack_webhook = 
webhook_enabled = false
webhook_url = 

[monitoring]
fim_enabled = true
fim_paths = C:/Windows/System32
fim_interval = 300
process_enabled = true
process_interval = 60
network_enabled = true
network_interval = 60
eventlog_enabled = true
eventlog_interval = 300

[ai]
enabled = true
anomaly_threshold = 0.7
training_window = 100

[ad_lab]
enabled = true
domain = corp.local
simulation_interval = 30
